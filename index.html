<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#060b12">
  <title>Neon Wheel Controller</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <section class="hud-bar card">
      <div class="hud-left">
        <input id="ipInput" type="text" inputmode="decimal" placeholder="192.168.1.10" autocomplete="off">
        <button id="connectBtn" class="btn primary">Connect</button>
        <button id="motionBtn" class="btn">Enable Motion</button>
      </div>
      <div class="hud-center">
        <div class="status-row">
          <span id="statusDot" class="status-dot"></span>
          <span id="statusText">Disconnected</span>
        </div>
        <div id="sensorText" class="sensor-text">Motion: Not enabled</div>
      </div>
      <div class="hud-right">
        <button id="invertBtn" class="btn">Invert L/R: Off</button>
        <button id="calibrateBtn" class="btn calibrate">Calibrate</button>
      </div>
    </section>

    <section class="settings-strip card">
      <div class="group">
        <span class="field-label">Profile</span>
        <div class="profile-buttons">
          <button id="profileXbox" class="btn profile active">Xbox</button>
          <button id="profilePs" class="btn profile">PS5</button>
          <button id="profileAssetto" class="btn profile">Assetto</button>
        </div>
      </div>
      <div class="group">
        <span class="field-label">Output</span>
        <div class="output-buttons">
          <button id="outputGamepad" class="btn output active">Gamepad</button>
          <button id="outputKeyboard" class="btn output">Keyboard</button>
        </div>
      </div>
      <div class="group">
        <span class="field-label">Drive</span>
        <div class="drive-buttons">
          <button id="driveNormal" class="btn drive active">Balanced</button>
          <button id="driveAssetto" class="btn drive">Assetto</button>
        </div>
      </div>
    </section>

    <section class="controller-shell card">
      <div class="left-cluster">
        <div id="brakeZone" class="pedal-zone brake">
          <div class="zone-label">Brake</div>
          <div class="meter-track">
            <div id="brakeMeter" class="meter-fill brake-fill"></div>
          </div>
          <div id="brakeValue" class="zone-value">0%</div>
        </div>
        <div id="gasZone" class="pedal-zone gas">
          <div class="zone-label">Gas</div>
          <div class="meter-track">
            <div id="gasMeter" class="meter-fill gas-fill"></div>
          </div>
          <div id="gasValue" class="zone-value">0%</div>
        </div>
      </div>

      <div class="center-cluster">
        <div class="steering-header">
          <h1>Steering</h1>
          <p id="steeringValue">Steering: 0.00</p>
        </div>
        <div class="wheel-wrap">
          <div id="wheelGlow" class="wheel-glow"></div>
          <div id="wheel" class="wheel">
            <div class="wheel-core"></div>
            <div class="spoke spoke-a"></div>
            <div class="spoke spoke-b"></div>
            <div class="spoke spoke-c"></div>
          </div>
        </div>
      </div>

      <div class="right-cluster">
        <div class="action-header">
          <h2>Buttons</h2>
          <p id="actionHint">Xbox layout</p>
        </div>
        <div class="shoulder-row">
          <button id="btnLb" class="btn action">LB</button>
          <button id="btnRb" class="btn action">RB</button>
        </div>
        <div class="face-grid">
          <div></div>
          <button id="btnNorth" class="btn action">Y</button>
          <div></div>
          <button id="btnWest" class="btn action">X</button>
          <button id="btnSouth" class="btn action primary-action">A</button>
          <button id="btnEast" class="btn action warn-action">B</button>
        </div>
      </div>
    </section>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
